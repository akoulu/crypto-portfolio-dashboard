<section class="auth-page">
  <div class="auth-visual" aria-hidden="true">
    <div class="auth-visual__glow"></div>
    <h2 class="display-title">Track every asset.<br /><span class="text-gradient">Own your portfolio.</span></h2>
    <p>Vibrant insights, dark-mode comfort, and motion-guided flows built for 2026.</p>
  </div>

  <div class="auth-panel neo-card animate-in">
    <div class="auth-brand">
      <mat-icon>currency_bitcoin</mat-icon>
      <span>Crypto Portfolio</span>
    </div>

    <h1 class="page-title">Welcome back</h1>
    <p class="page-subtitle">Sign in to access your dashboard and analytics.</p>

    <form class="auth-form">
      <label>
        Email
        <input type="email" placeholder="you@example.com" autocomplete="email" />
      </label>
      <label>
        Password
        <input type="password" placeholder="••••••••" autocomplete="current-password" />
      </label>
      <button type="button" class="btn-primary">Sign in</button>
    </form>

    <p class="auth-switch">
      No account?
      <a routerLink="/auth/register">Create one</a>
    </p>
  </div>
</section>
