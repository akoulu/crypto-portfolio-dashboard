<section class="auth-minimal animate-in">
  <div class="auth-minimal__card">
    <p class="auth-minimal__brand">Crypto Portfolio</p>

    <h1 class="auth-minimal__title">Sign in</h1>
    <p class="auth-minimal__subtitle">Enter your credentials to access the dashboard.</p>

    <form class="auth-minimal__form">
      <label>
        Email
        <input type="email" placeholder="you@example.com" autocomplete="email" />
      </label>
      <label>
        Password
        <input type="password" placeholder="Your password" autocomplete="current-password" />
      </label>
      <button type="button" class="btn-minimal">Sign in</button>
    </form>

    <p class="auth-minimal__switch">
      No account?
      <a routerLink="/register">Register</a>
    </p>
  </div>
</section>
