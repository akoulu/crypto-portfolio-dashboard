<section class="auth-page">
  <div class="auth-visual" aria-hidden="true">
    <span class="max-blob max-blob--1"></span>
    <span class="max-blob max-blob--2"></span>
    <span class="sticker sticker--hot auth-sticker">Maximalism 2026</span>
    <h2 class="display-title">
      GO BIG.<br />
      <span class="text-gradient">TRACK EVERYTHING.</span>
    </h2>
    <p>Rich color, bold type, stacked layers — your portfolio deserves the full treatment.</p>
    <div class="auth-tags">
      <span class="sticker sticker--cool">Dark mode</span>
      <span class="sticker sticker--lime">Live data</span>
      <span class="sticker">Zero boring UI</span>
    </div>
  </div>

  <div class="auth-panel neo-card animate-in">
    <div class="auth-brand">
      <mat-icon>currency_bitcoin</mat-icon>
      <span>CRYPTO PORTFOLIO</span>
    </div>

    <h1 class="page-title">Welcome back</h1>
    <p class="page-subtitle">Sign in to access your maximal dashboard.</p>

    <form class="auth-form">
      <label>
        Email
        <input type="email" placeholder="you@example.com" autocomplete="email" />
      </label>
      <label>
        Password
        <input type="password" placeholder="••••••••" autocomplete="current-password" />
      </label>
      <button type="button" class="btn-primary">Sign in</button>
    </form>

    <p class="auth-switch">
      No account?
      <a routerLink="/auth/register">Create one</a>
    </p>
  </div>
</section>
