<section class="auth-minimal animate-in">
  <div class="auth-minimal__card">
    <p class="auth-minimal__brand">Crypto Portfolio</p>

    <h1 class="auth-minimal__title">Create account</h1>
    <p class="auth-minimal__subtitle">A simple start — manage your crypto in one place.</p>

    <form class="auth-minimal__form">
      <label>
        Full name
        <input type="text" placeholder="Alex Morgan" autocomplete="name" />
      </label>
      <label>
        Email
        <input type="email" placeholder="you@example.com" autocomplete="email" />
      </label>
      <label>
        Password
        <input type="password" placeholder="Create a password" autocomplete="new-password" />
      </label>
      <button type="button" class="btn-minimal">Create account</button>
    </form>

    <p class="auth-minimal__switch">
      Already have an account?
      <a routerLink="/login">Sign in</a>
    </p>
  </div>
</section>
