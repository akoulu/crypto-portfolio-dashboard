<section class="auth-page">
  <div class="auth-visual" aria-hidden="true">
    <div class="auth-visual__glow"></div>
    <h2 class="display-title">Start with clarity.<br /><span class="text-gradient">Grow with confidence.</span></h2>
    <p>Create an account and unlock portfolio tracking, analytics, and smart insights.</p>
  </div>

  <div class="auth-panel neo-card animate-in">
    <div class="auth-brand">
      <mat-icon>currency_bitcoin</mat-icon>
      <span>Crypto Portfolio</span>
    </div>

    <h1 class="page-title">Create account</h1>
    <p class="page-subtitle">Join free — set up your workspace in under a minute.</p>

    <form class="auth-form">
      <label>
        Full name
        <input type="text" placeholder="Alex Morgan" autocomplete="name" />
      </label>
      <label>
        Email
        <input type="email" placeholder="you@example.com" autocomplete="email" />
      </label>
      <label>
        Password
        <input type="password" placeholder="••••••••" autocomplete="new-password" />
      </label>
      <button type="button" class="btn-primary">Create account</button>
    </form>

    <p class="auth-switch">
      Already have an account?
      <a routerLink="/auth">Sign in</a>
    </p>
  </div>
</section>
