<section class="auth-page">
  <div class="auth-visual" aria-hidden="true">
    <span class="max-blob max-blob--1"></span>
    <span class="max-blob max-blob--2"></span>
    <span class="sticker sticker--lime auth-sticker">Join the stack</span>
    <h2 class="display-title">
      MORE COLOR.<br />
      <span class="text-gradient">MORE CONTROL.</span>
    </h2>
    <p>Create an account and unlock the full maximal portfolio experience.</p>
    <div class="auth-tags">
      <span class="sticker sticker--hot">Free</span>
      <span class="sticker sticker--cool">Analytics</span>
    </div>
  </div>

  <div class="auth-panel neo-card animate-in">
    <div class="auth-brand">
      <mat-icon>currency_bitcoin</mat-icon>
      <span>CRYPTO PORTFOLIO</span>
    </div>

    <h1 class="page-title">Create account</h1>
    <p class="page-subtitle">Set up your workspace in under a minute.</p>

    <form class="auth-form">
      <label>
        Full name
        <input type="text" placeholder="Alex Morgan" autocomplete="name" />
      </label>
      <label>
        Email
        <input type="email" placeholder="you@example.com" autocomplete="email" />
      </label>
      <label>
        Password
        <input type="password" placeholder="••••••••" autocomplete="new-password" />
      </label>
      <button type="button" class="btn-primary">Create account</button>
    </form>

    <p class="auth-switch">
      Already have an account?
      <a routerLink="/auth">Sign in</a>
    </p>
  </div>
</section>
