<section class="page animate-in">
  <header class="page-header">
    <div>
      <p class="page-subtitle">Visualize allocation, profit &amp; loss trends, and portfolio health over time.</p>
    </div>
    <span class="chip">Charts ready</span>
  </header>

  <div class="page-grid page-grid--2">
    <article class="panel chart-panel hover-lift stagger-1">
      <h3 class="panel-title">Allocation</h3>
      <div class="chart-placeholder">
        <mat-icon>donut_large</mat-icon>
        <p>Allocation chart will render here with ngx-echarts.</p>
      </div>
    </article>

    <article class="panel chart-panel hover-lift stagger-2">
      <h3 class="panel-title">Profit &amp; loss</h3>
      <div class="chart-placeholder">
        <mat-icon>stacked_line_chart</mat-icon>
        <p>P&amp;L timeline will render here with ngx-echarts.</p>
      </div>
    </article>
  </div>
</section>
