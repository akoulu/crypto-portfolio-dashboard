<section class="page animate-in">
  <header class="page-header">
    <div>
      <p class="eyebrow">Insights</p>
      <p class="page-subtitle">Layered charts, bold metrics, full portfolio story.</p>
    </div>
    <span class="sticker sticker--lime">Charts ready</span>
  </header>

  <div class="page-grid page-grid--2">
    <article class="panel panel--violet chart-panel hover-lift stagger-1">
      <div class="panel-head">
        <h3 class="panel-title">Allocation</h3>
        <span class="chip">Pie</span>
      </div>
      <div class="chart-placeholder">
        <mat-icon>donut_large</mat-icon>
        <p>Allocation chart will render here with ngx-echarts.</p>
      </div>
    </article>

    <article class="panel panel--cyan chart-panel hover-lift stagger-2">
      <div class="panel-head">
        <h3 class="panel-title">Profit &amp; loss</h3>
        <span class="chip chip--gold">Timeline</span>
      </div>
      <div class="chart-placeholder">
        <mat-icon>stacked_line_chart</mat-icon>
        <p>P&amp;L timeline will render here with ngx-echarts.</p>
      </div>
    </article>
  </div>
</section>
