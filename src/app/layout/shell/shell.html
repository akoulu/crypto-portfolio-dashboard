<mat-sidenav-container class="shell">
  <mat-sidenav
    class="sidebar"
    [mode]="sidenavMode"
    [opened]="opened"
    (openedChange)="onSidenavOpenedChange($event)"
    [attr.aria-hidden]="isMobile && !opened">

    <div class="sidebar-inner">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <mat-icon>currency_bitcoin</mat-icon>
        </span>
        <div class="brand-copy">
          <span class="brand-name text-gradient">CRYPTO</span>
          <span class="brand-tag sticker sticker--lime">Max mode</span>
        </div>
      </div>

      <mat-nav-list class="nav" aria-label="Main navigation">
        <a
          mat-list-item
          class="nav-link"
          routerLink="/dashboard"
          routerLinkActive="nav-link--active"
          (click)="closeSidenavOnMobile()">
          <mat-icon>dashboard</mat-icon>
          <span>Dashboard</span>
        </a>

        <a
          mat-list-item
          class="nav-link"
          routerLink="/portfolio"
          routerLinkActive="nav-link--active"
          (click)="closeSidenavOnMobile()">
          <mat-icon>account_balance_wallet</mat-icon>
          <span>Portfolio</span>
        </a>

        <a
          mat-list-item
          class="nav-link"
          routerLink="/transactions"
          routerLinkActive="nav-link--active"
          (click)="closeSidenavOnMobile()">
          <mat-icon>receipt_long</mat-icon>
          <span>Transactions</span>
        </a>

        <a
          mat-list-item
          class="nav-link"
          routerLink="/analytics"
          routerLinkActive="nav-link--active"
          (click)="closeSidenavOnMobile()">
          <mat-icon>bar_chart</mat-icon>
          <span>Analytics</span>
        </a>
      </mat-nav-list>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="main">
    <div class="max-bg" aria-hidden="true">
      <span class="max-blob max-blob--1"></span>
      <span class="max-blob max-blob--2"></span>
      <span class="max-blob max-blob--3"></span>
    </div>

    <header class="header">
      <button
        mat-icon-button
        type="button"
        class="icon-btn"
        (click)="toggleSidenav()"
        [attr.aria-label]="opened ? 'Close menu' : 'Open menu'"
        [attr.aria-expanded]="opened">
        <mat-icon>{{ isMobile && opened ? 'close' : 'menu' }}</mat-icon>
      </button>

      <div class="header-copy">
        <p class="eyebrow">Portfolio HQ</p>
        <h1 class="page-title">{{ pageTitle }}</h1>
      </div>

      <div class="header-actions">
        <nav class="auth-nav" aria-label="Authentication">
          <a
            routerLink="/login"
            routerLinkActive="auth-nav__link--active"
            class="auth-nav__link"
            (click)="closeSidenavOnMobile()">
            Login
          </a>
          <a
            routerLink="/register"
            routerLinkActive="auth-nav__link--active"
            class="auth-nav__link auth-nav__link--register"
            (click)="closeSidenavOnMobile()">
            Register
          </a>
        </nav>

        <span class="sticker sticker--cool header-sticker">Live</span>
        <button
          mat-icon-button
          type="button"
          class="icon-btn"
          (click)="toggleTheme()"
          [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
          <mat-icon>{{ isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
        </button>
        <button mat-icon-button type="button" class="icon-btn" aria-label="Notifications">
          <mat-icon>notifications_none</mat-icon>
        </button>
      </div>
    </header>

    <div class="page-scroll">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
